<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Moreno Colaiacovo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Moreno Colaiacovo — Bioinformatics systems specialist at the Joint Research Centre in Ispra, Italy.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Dark hero: name + summary -->
<header class="hero">
  <div class="seq-bg" id="seqBg" aria-hidden="true"></div>
  <div class="hero-inner">

    <div class="hero-identity">
      <h1 class="name">
        <span class="name-first">Moreno</span>
        <span class="name-last">Colaiacovo</span>
      </h1>
      <div class="meta">
        <span class="meta-item">Bioinformatics systems specialist</span>
      </div>
      <nav class="hero-links" aria-label="Social links">
        <a href="https://codeberg.org/emmecola">Codeberg</a>
        <a href="https://orcid.org/0000-0003-1320-0506">ORCID</a>
        <a href="https://www.linkedin.com/in/colaiacovo/">LinkedIn</a>
        <a href="https://mastodon.uno/@emmecola" rel="me">Mastodon</a>
      </nav>
    </div>

    <div class="hero-summary">
      <div id="summary-content" class="prose"></div>
    </div>

  </div>
</header>

<!-- Light cards area -->
<div class="cards-wrap">
  <div class="cards-grid">

    <!-- Card 1: Skills (loaded from content/skills.md) -->
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">Skills</h2>
      </div>
      <div class="card-body">
        <div id="skills-content" class="prose"></div>
      </div>
    </section>

    <!-- Card 2: Recent Projects (loaded from content/projects.md) -->
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">Recent Projects</h2>
      </div>
      <div class="card-body">
        <div id="projects-content" class="prose"></div>
      </div>
    </section>

    <!-- Card 3: Recent Publications (loaded from content/publications.md) -->
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">Recent Publications</h2>
      </div>
      <div class="card-body">
        <div id="publications-content" class="prose"></div>
      </div>
    </section>

  </div>
</div>

<footer>emmecola.codeberg.page</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
